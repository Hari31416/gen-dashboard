# Local development stack: MongoDB + MariaDB + MinIO
# Contains ONLY infrastructure services (no FastAPI / Gradio application containers)
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#   docker compose -f docker-compose.dev.yml down
#   docker compose -f docker-compose.dev.yml logs -f
#
# After stack starts you can connect from local Python / notebooks:
#   MongoDB URI: mongodb://admin:secret@localhost:27019/?authSource=admin
#   MariaDB URI: mysql+pymysql://root:password@localhost:3307/gen_bi
#   MinIO console: http://localhost:9001  (S3 endpoint: http://localhost:9000)  creds: minioadmin / minioadmin
#
# Volumes are mapped to ../volumes so data persists across container restarts.
# Adjust DOCKER_VOLUME_DIRECTORY env var if you want a different host base path.

services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secret
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-../volumes}/mongodb:/data/db
    # Expose on alternate host port to avoid conflicts with a locally installed MongoDB
    ports:
      - "27019:27017"
    networks:
      - dataviz

  mariadb:
    image: mariadb:latest
    container_name: mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: password
      MARIADB_DATABASE: gen_bi
    ports:
      - "3307:3306"
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-../volumes}/mariadb_gen_bi:/var/lib/mysql
    networks:
      - dataviz
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 30s
      timeout: 10s
      retries: 3

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: minio
    restart: unless-stopped
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data --console-address ":9001"
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-../volumes}/minio:/minio_data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console UI
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - dataviz


networks:
  dataviz:
    driver: bridge

volumes:
  mongodb:
  minio:
  mariadb:
