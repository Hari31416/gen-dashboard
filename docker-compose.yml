version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: mongodb-dashboard
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secret
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-./volumes}/mongodb:/data/db
    # Expose on alternate host port to avoid conflicts with a locally installed MongoDB
    ports:
      - "27019:27017"

volumes:
  mongodb_data:
